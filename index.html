<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAL Safety Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.home-screen {
  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url('fireproofing-worker.jpg');
  background-size: cover;
  background-position: center;
  min-height: 100vh;
  color: white;
}

.header {
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

.home-menu {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 12px;
  padding: 20px;
}

.home-menu button {
  width: 240px;
  text-align: left;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: #1e2a38;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.home-menu button:hover {
  background: #2f3e52;
}
</style>
</head>

<body>

<div class="home-screen">
  <div class="header">PAL Safety Hub</div>

  <div class="home-menu">
    <button onclick="goTo('projects')">Projects</button>
    <button onclick="goTo('forms')">Safety Forms</button>
    <button onclick="goTo('toolbox')">Toolbox Talks</button>
    <button onclick="goTo('certs')">Employee Certs</button>
    <button onclick="goTo('policies')">PAL Policies</button>
  </div>
</div>

<script>
function goTo(section) {
  alert("Navigate to: " + section);
}
</script>

</body>
</html>
